<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Password Generator & Analyzer</h2>
        
        <div class="display-container">
            <input type="text" id="password-display" placeholder="Type or Generate Password">
            <button id="copy-btn">Copy</button>
            <button id="clear-btn">Clear</button> </div>
            
        <div class="strength-meter">
            <span id="strength-text">Strength: </span>
            <div class="strength-bar" id="strength-bar"></div>
            <small id="crack-time">Estimated Crack Time: --</small>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="length">Password Length: <span id="length-val">16</span></label>
                <input type="range" id="length" min="8" max="32" value="16">
            </div>

            <div class="checkbox-group">
                <label><input type="checkbox" id="uppercase" checked> Include Uppercase</label>
                <label><input type="checkbox" id="numbers" checked> Include Numbers</label>
                <label><input type="checkbox" id="symbols" checked> Include Symbols</label>
            </div>

            <button id="generate-btn" class="glow-btn">Generate Password</button>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
